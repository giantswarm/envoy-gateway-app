version: 2.1
orbs:
  architect: giantswarm/architect@9.5.3

workflows:
  package-and-push-chart-on-tag:
    jobs:
    - architect/push-to-registries:
        context: architect
        name: push-crd-image-to-registries
        image: giantswarm/envoy-gateway-crds
        split-china-push: true
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
            - master

    - architect/sync-china-registry:
        context: architect
        name: sync-china-registry
        image: giantswarm/envoy-gateway-crds
        requires:
        - push-crd-image-to-registries
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /^.*$/

    - architect/push-to-app-catalog:
        context: architect
        executor: app-build-suite
        name: package and push envoy-gateway chart
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: envoy-gateway
        override_app_version: false
        requires:
        - push-crd-image-to-registries
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
            - master
