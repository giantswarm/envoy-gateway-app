global:
  apps:
    certManager:
      values:
        cert-manager:
          config:
            apiVersion: controller.config.cert-manager.io/v1alpha1
            enableGatewayAPI: true
            kind: ControllerConfiguration
  connectivity:
    dns:
      wildcardCnameTarget: gateway
    certManager:
      useDnsChallenges: true
  nodePools:
    def00:
      minSize: 5
      maxSize: 5
